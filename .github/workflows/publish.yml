# Publish PySDKit to PyPI when a version tag is pushed, e.g. v0.4.31
#
# One-time setup on PyPI (Trusted Publishing):
#   1. https://pypi.org/manage/project/PySDKit/settings/publishing/
#   2. Add a Trusted Publisher:
#        Owner:      wwhenxuan
#        Repository: PySDKit
#        Workflow:   publish.yml
#        Environment: pypi   (optional but recommended; match "environment:" below)
#   3. No API token secret is needed after Trusted Publishing is configured.
#
# Release steps:
#   1. Bump pysdkit/__init__.py -> __version__ = "x.y.z"
#   2. Commit and push to main
#   3. Create and push a matching tag:
#        git tag v0.4.31
#        git push origin v0.4.31

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check metadata
        run: python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/PySDKit/
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
